services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ttrge
      POSTGRES_PASSWORD: ttrge
      POSTGRES_DB: ttrge
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ttrge"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
