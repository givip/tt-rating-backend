name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PNPM_VERSION: "9.15.0"
  NODE_VERSION: "20"

# This repo declares `@tt-rating/core` as `file:../../../core` in
# apps/api/package.json. To make `pnpm install` resolve, we check out the
# backend and core into sibling directories under $GITHUB_WORKSPACE so that
# from `backend/apps/api/`, the path `../../../core` lands on `core/`.
jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend
      - name: Checkout core (workspace dep via file:../../../core)
        uses: actions/checkout@v4
        with:
          repository: givip/tt-rating-core
          path: core
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Build core (workspace dep — its dist/ must exist before backend typecheck/build)
        run: cd ../core && pnpm install --no-frozen-lockfile && pnpm run build
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: cd packages/db && pnpm exec prisma generate
      - run: pnpm turbo typecheck

  test:
    name: Tests (unit + integration)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: givip/tt-rating-core
          path: core
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Build core (workspace dep — its dist/ must exist before backend typecheck/build)
        run: cd ../core && pnpm install --no-frozen-lockfile && pnpm run build
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: cd packages/db && pnpm exec prisma generate
      - name: Unit tests (mocked Prisma)
        run: pnpm turbo test
      - name: Build rating-job (integration tests load it via dist/)
        run: pnpm --filter=@tt-rating/rating-job build
      - name: Integration tests (Testcontainers Postgres)
        run: pnpm --filter=@tt-rating/api test:integration

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [typecheck, test]
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          path: backend
      - name: Checkout core
        uses: actions/checkout@v4
        with:
          repository: givip/tt-rating-core
          path: core
      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: backend/pnpm-lock.yaml
      - name: Build core (workspace dep — its dist/ must exist before backend typecheck/build)
        run: cd ../core && pnpm install --no-frozen-lockfile && pnpm run build
      - run: pnpm install --frozen-lockfile
      - name: Generate Prisma client
        run: cd packages/db && pnpm exec prisma generate
      - run: pnpm turbo build
